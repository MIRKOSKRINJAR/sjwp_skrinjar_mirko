
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadatak 5</title>
<style>
    .a { grid-area: a; }
    .b { grid-area: b; }
    .c { grid-area: c; }
    .d { grid-area: d; }
    .e { grid-area: e; }
    .f { grid-area: f; }
.container{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 5px;
}
.proizvod{
    width: 100;
    height: 100px;
    border: 2px solid black;
    display: flex;
    justify-content: center;
    align-items: center;

}
@media(min-width: 768px){
    .container{
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-areas:
                "a a a b"
                "c d e f";
    }
}
@media (max-width: 767px){
    .container{
        grid-template-columns: 1fr;
        grid-template-areas:
            "a"
            "b"
            "c"
            "d"
            "e"
            "f";
    }
    .a{
        height: 200px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="proizvod a">Kartica 1</div>
    <div class="proizvod b">Kartica 2</div>
    <div class="proizvod c">Kartica 3</div>
    <div class="proizvod d">Kartica 4</div>
    <div class="proizvod e">Kartica 5</div>
    <div class="proizvod f">Kartica 6</div>
</div>
</body>
</html>
