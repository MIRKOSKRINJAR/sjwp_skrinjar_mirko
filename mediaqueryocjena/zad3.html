
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadatak 3</title>
<style>
.container{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
}
.proizvod{
    width: 100;
    height: 70px;
    border: 2px solid black;
    display: flex;
    justify-content: center;
    align-items: center;

}
@media (min-width: 768px) and (max-width: 1023px){
.container{
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr 1fr;
}
}
@media (max-width: 767px){
.container{
    grid-template-columns: 1fr;
    grid-template-rows: repeat(8, 1fr);
}
}
</style>
</head>
<body>
<div class="container">
    <div class="proizvod"> 1</div>
    <div class="proizvod">2</div>
    <div class="proizvod">3</div>
    <div class="proizvod">4</div>
    <div class="proizvod">5</div>
    <div class="proizvod">6</div>
    <div class="proizvod">7</div>
    <div class="proizvod">8</div>
    <div class="proizvod">9</div>
    <div class="proizvod">10</div>
    <div class="proizvod">11</div>
    <div class="proizvod">12</div>
</div>
</body>
</html>
