<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadatak 4</title>
<style>
    .a1 { grid-area: a1; }
    .a2 { grid-area: a2; }
    .a3 { grid-area: a3; }
    .a4 { grid-area: a4; }
    .a5 { grid-area: a5; }
    .container{
        display: grid;
        grid-template-areas:"a1 a2 a3 a4 a5";
        gap: 5px;
    }
    .proizvod{
        width: 100;
        height: 100px;
        border: 2px solid black;
        display: flex;
        justify-content: center;
        align-items: center;

    }
@media (min-width: 768px) and (max-width: 1023px){
    .container{
        grid-template-columns: 1fr 1fr;
            grid-template-areas:
            "a1 a2"
            "a3 a4"
            "a5 a5";
    }
}
@media (max-width: 767px){
    .container{
        grid-template-columns: 1fr;
        grid-template-areas:
            "a1"
            "a2"
            "a3"
            "a4"
            "a5";
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="proizvod a1">Korisnici</div>
    <div class="proizvod a2">Prodaja</div>
    <div class="proizvod a3">Poruke</div>
    <div class="proizvod a4">Konverzacija</div>
    <div class="proizvod a5">Zadaci</div>
</div>
</body>
</html>
