<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadatak 1</title>
<style>
.container{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 5px;
}
.proizvod{
    width: 100;
    height: 100px;
    border: 2px solid black;
    display: flex;
    justify-content: center;
    align-items: center;

}
@media (min-width: 768px) and (max-width: 1023px){
    .container{
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr 1fr;
    }
}
    @media (max-width: 767px){
    .container{
    grid-template-columns: 1fr;
    grid-template-rows: repeat(8, 1fr);
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="proizvod">Proizvod 1</div>
    <div class="proizvod">Proizvod 2</div>
    <div class="proizvod">Proizvod 3</div>
    <div class="proizvod">Proizvod 4</div>
    <div class="proizvod">Proizvod 5</div>
    <div class="proizvod">Proizvod 6</div>
    <div class="proizvod">Proizvod 7</div>
    <div class="proizvod">Proizvod 8</div>
</div>
</body>
</html>
